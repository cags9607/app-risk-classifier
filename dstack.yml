type: task
name: app-classifier-worker

python: "3.11"

env:
  - QUEUE_URL
  - QUEUE_API_KEY
  - QUEUE_KEY=APP_CLASSIFIER_PLACEHOLDER
  - APP_CLASSIFIER_HF_REPO_ID=Trinotrotolueno/app-risk-adapters
  - APP_CLASSIFIER_HF_SUBFOLDER=pdu
  - APP_CLASSIFIER_HF_TOKEN=
  - BATCH_SIZE=8

commands:
  - pip install -e .
  - python processor.py

resources:
  gpu:
    memory: 16GB..24GB
